spring:
  application:
    name: fashionstore
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fashion-store}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:230204}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: -1

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        globally_quoted_identifiers: true

  jackson:
    time-zone: Asia/Ho_Chi_Minh
    date-format: yyyy-MM-dd HH:mm:ss

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:fashionstore-jwt-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256}
  expiration: 86400000    # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

app:
  seed:
    enabled: ${APP_SEED_ENABLED:true}
  migration:
    user-role:
      enabled: ${APP_MIGRATION_USER_ROLE_ENABLED:false}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  charset:
    console: UTF-8
    file: UTF-8
  level:
    root: INFO
    vn.edu.hcmuaf.fit.fashionstore: INFO
