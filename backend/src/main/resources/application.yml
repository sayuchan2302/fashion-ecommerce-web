spring:
  config:
    import: optional:file:.env[.properties],optional:file:backend/.env[.properties]
  application:
    name: fashionstore
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: -1

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        globally_quoted_identifiers: true

  jackson:
    time-zone: Asia/Ho_Chi_Minh
    date-format: yyyy-MM-dd HH:mm:ss

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000    # 24 hours in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

app:
  upload:
    base-dir: ${APP_UPLOAD_BASE_DIR:backend/upload}
    max-avatar-size-bytes: ${APP_UPLOAD_MAX_AVATAR_SIZE_BYTES:3145728}
    max-product-image-size-bytes: ${APP_UPLOAD_MAX_PRODUCT_IMAGE_SIZE_BYTES:5242880}
    max-store-image-size-bytes: ${APP_UPLOAD_MAX_STORE_IMAGE_SIZE_BYTES:5242880}
    max-category-image-size-bytes: ${APP_UPLOAD_MAX_CATEGORY_IMAGE_SIZE_BYTES:5242880}
    max-review-image-size-bytes: ${APP_UPLOAD_MAX_REVIEW_IMAGE_SIZE_BYTES:5242880}
    max-return-evidence-size-bytes: ${APP_UPLOAD_MAX_RETURN_EVIDENCE_SIZE_BYTES:5242880}
  seed:
    enabled: ${APP_SEED_ENABLED:true}
    gap:
      enabled: ${APP_SEED_GAP_ENABLED:true}
      target-count: ${APP_SEED_GAP_TARGET_COUNT:1000}
      styles-path: ${APP_SEED_GAP_STYLES_PATH:backend/src/main/resources/seeder/gap/styles.csv}
      images-path: ${APP_SEED_GAP_IMAGES_PATH:backend/src/main/resources/seeder/gap/images.csv}
      clean-before-import: ${APP_SEED_GAP_CLEAN_BEFORE_IMPORT:true}
  chatbot:
    ai-fallback-enabled: ${APP_CHATBOT_AI_FALLBACK_ENABLED:false}
    direct-line-secret: ${BOT_DIRECT_LINE_SECRET:}
    direct-line-token-endpoint: ${BOT_DIRECT_LINE_TOKEN_ENDPOINT:https://directline.botframework.com/v3/directline/tokens/generate}
    direct-line-conversation-endpoint: ${BOT_DIRECT_LINE_CONVERSATION_ENDPOINT:https://directline.botframework.com/v3/directline/conversations}
  notifications:
    promotion:
      timezone: ${APP_PROMOTION_NOTIFICATION_TIMEZONE:Asia/Ho_Chi_Minh}
      dispatcher:
        fixed-delay-ms: ${APP_PROMOTION_DISPATCHER_DELAY_MS:15000}
        batch-size: ${APP_PROMOTION_DISPATCHER_BATCH_SIZE:100}
        max-attempts: ${APP_PROMOTION_DISPATCHER_MAX_ATTEMPTS:8}
        backoff-minutes: "${APP_PROMOTION_DISPATCHER_BACKOFF_MINUTES:1,5,15,60}"
      reminder:
        cron: ${APP_PROMOTION_REMINDER_CRON:0 */10 * * * *}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  charset:
    console: UTF-8
    file: UTF-8
  level:
    root: INFO
    vn.edu.hcmuaf.fit.fashionstore: INFO

vnpay:
  tmn-code: ${VNPAY_TMN_CODE:}
  hash-secret: ${VNPAY_HASH_SECRET:}
  pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  return-url: ${VNPAY_RETURN_URL:http://localhost:5173/payment-result}
  ipn-url: ${VNPAY_IPN_URL:}
  expire-minutes: ${VNPAY_EXPIRE_MINUTES:15}
  locale: ${VNPAY_LOCALE:vn}

momo:
  partner-code: ${MOMO_PARTNER_CODE:}
  access-key: ${MOMO_ACCESS_KEY:}
  secret-key: ${MOMO_SECRET_KEY:}
  create-url: ${MOMO_CREATE_URL:https://test-payment.momo.vn/v2/gateway/api/create}
  query-url: ${MOMO_QUERY_URL:https://test-payment.momo.vn/v2/gateway/api/query}
  return-url: ${MOMO_RETURN_URL:http://localhost:5173/payment-result}
  ipn-url: ${MOMO_IPN_URL:}
  request-type: ${MOMO_REQUEST_TYPE:captureWallet}
  lang: ${MOMO_LANG:vi}
  auto-capture: ${MOMO_AUTO_CAPTURE:true}

azure-bot:
  microsoft-app-id: ${MicrosoftAppId:}
  microsoft-app-password: ${MicrosoftAppPassword:}
  microsoft-app-tenant-id: ${MicrosoftAppTenantId:}
  microsoft-app-type: ${MicrosoftAppType:SingleTenant}
  authentication-enabled: ${AZURE_BOT_AUTH_ENABLED:false}
